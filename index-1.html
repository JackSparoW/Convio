<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Convio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ============================================================
     DESIGN TOKENS — espresso ink + warm paper + saffron accent
     ============================================================ */
  :root{
    --ink:#1B1533;            /* app frame */
    --ink-soft:#272050;
    --ink-line:#342C5C;
    --surface:#F7F5FC;        /* work area, warm paper */
    --raised:#FFFFFF;
    --line:#E7E2F3;
    --line-strong:#D5CDEC;
    --text:#1E1A33;
    --muted:#8580A3;
    --accent:#7C3AED;         /* saffron */
    --accent-press:#6D28D9;
    --accent-tint:#F1E9FD;
    --success:#2E8B58;
    --success-tint:#E4F2EA;
    --danger:#C5443A;
    --danger-tint:#FBEAE8;
    --r:14px;
    --r-sm:10px;
    --shadow:0 1px 2px rgba(33,26,19,.06), 0 8px 24px rgba(33,26,19,.06);
    --tap:48px;
    font-family:'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--surface);color:var(--text);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.45}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit;font-size:16px} /* 16px stops iOS zoom */
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px}

  /* ---------- centered card screens (setup / login / loading) ---------- */
  .center{min-height:100dvh;display:grid;place-items:center;padding:24px;background:
     radial-gradient(120% 80% at 50% -10%, #1E1A33 0%, var(--ink) 55%)}
  .card{width:100%;max-width:380px;background:var(--raised);border-radius:18px;
     box-shadow:0 20px 60px rgba(0,0,0,.35);padding:28px 24px}
  .brandmark{display:flex;align-items:center;gap:10px;margin-bottom:22px}
  .brandmark .dot{width:34px;height:34px;border-radius:9px;background:var(--accent);
     display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px}
  .brandmark b{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .brandmark span{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;height:var(--tap);padding:0 14px;border:1.5px solid var(--line-strong);
     border-radius:var(--r-sm);background:#fff;transition:border-color .15s}
  .field input:focus{border-color:var(--accent);outline:none}
  .btn{height:var(--tap);width:100%;border-radius:var(--r-sm);font-weight:700;font-size:15px;
     display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .05s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-press)}
  .btn-primary[disabled]{opacity:.55;pointer-events:none}
  .btn-ghost{background:var(--surface);color:var(--text);border:1.5px solid var(--line)}
  .hint{font-size:12.5px;color:var(--muted);margin-top:14px;line-height:1.5}
  .note{background:var(--accent-tint);border:1px solid #DCD2F2;border-radius:var(--r-sm);
     padding:12px 13px;font-size:12.5px;color:#5B21B6;margin-bottom:18px;line-height:1.55}
  .note b{color:#4C1D95}
  code{background:#EFEAF8;padding:1px 6px;border-radius:5px;font-size:12px;font-family:ui-monospace,Menlo,monospace}

  /* ---------- app shell ---------- */
  .shell{display:grid;min-height:100dvh}
  @media(min-width:880px){ .shell{grid-template-columns:240px 1fr} }

  /* desktop sidebar */
  .side{display:none;background:var(--ink);color:#ECE7F6;flex-direction:column;
     padding:18px 14px;position:sticky;top:0;height:100dvh}
  @media(min-width:880px){ .side{display:flex} }
  .side .brandmark b{color:#fff}
  .side .brandmark span{color:#9890B5}
  .nav{display:flex;flex-direction:column;gap:4px;margin-top:24px;flex:1}
  .nav button{display:flex;align-items:center;gap:11px;height:46px;padding:0 13px;border-radius:10px;
     color:#C4BBDD;font-weight:600;font-size:14.5px;text-align:left;width:100%;transition:background .12s,color .12s}
  .nav button:hover{background:var(--ink-soft);color:#fff}
  .nav button.active{background:var(--accent);color:#fff}
  .nav .ic{width:20px;text-align:center;font-size:16px}
  .side .who{border-top:1px solid var(--ink-line);padding-top:14px;margin-top:6px}
  .side .who .nm{font-weight:600;font-size:13.5px;color:#fff}
  .side .who .rl{font-size:11.5px;color:#9890B5;text-transform:capitalize;margin-top:1px}
  .side .who button{margin-top:11px;width:100%;height:40px;border-radius:9px;border:1px solid var(--ink-line);
     color:#C4BBDD;font-weight:600;font-size:13px}
  .side .who button:hover{background:var(--ink-soft);color:#fff}

  /* mobile topbar */
  .topbar{display:flex;align-items:center;gap:12px;background:var(--ink);color:#fff;
     padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));position:sticky;top:0;z-index:30}
  @media(min-width:880px){ .topbar{display:none} }
  .topbar .brandmark{margin:0;flex:1}
  .topbar .brandmark .dot{width:30px;height:30px;font-size:16px}
  .topbar .brandmark b{color:#fff;font-size:15px}
  .topbar .brandmark span{display:none}
  .topbar .logout{font-size:13px;font-weight:600;color:#C4BBDD;padding:8px;border-radius:8px}

  /* mobile bottom tab bar */
  .tabbar{display:flex;background:var(--raised);border-top:1px solid var(--line);
     position:sticky;bottom:0;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
  @media(min-width:880px){ .tabbar{display:none} }
  .tabbar button{flex:1;height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
     color:var(--muted);font-size:11px;font-weight:600}
  .tabbar button.active{color:var(--accent)}
  .tabbar .ic{font-size:19px}

  /* main column */
  .main{display:flex;flex-direction:column;min-width:0;min-height:100dvh}
  .work{flex:1;min-height:0}

  /* ============================================================
     POS — product area + cart rail
     ============================================================ */
  .pos{display:grid;min-height:100%}
  @media(min-width:880px){ .pos{grid-template-columns:1fr 340px} }

  .catalog{display:flex;flex-direction:column;min-width:0}
  .searchrow{padding:14px 16px;display:flex;gap:10px;position:sticky;top:0;background:var(--surface);z-index:10;border-bottom:1px solid var(--line)}
  @media(min-width:880px){ .searchrow{top:0} }
  .search{flex:1;display:flex;align-items:center;gap:9px;background:var(--raised);border:1.5px solid var(--line-strong);
     border-radius:var(--r-sm);padding:0 13px;height:var(--tap)}
  .search input{flex:1;border:none;outline:none;background:none}
  .search .mag{color:var(--muted);font-size:16px}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;height:38px;padding:0 16px;border-radius:999px;background:var(--raised);
     border:1.5px solid var(--line-strong);font-weight:600;font-size:13.5px;color:var(--muted);white-space:nowrap;transition:all .12s}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;padding:4px 16px 120px}
  @media(min-width:560px){ .grid{grid-template-columns:repeat(3,1fr)} }
  @media(min-width:880px){ .grid{grid-template-columns:repeat(2,1fr);padding-bottom:24px} }
  @media(min-width:1180px){ .grid{grid-template-columns:repeat(3,1fr)} }
  .pcard{background:var(--raised);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
     text-align:left;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .06s,border-color .12s;min-height:130px}
  .pcard:hover{border-color:var(--line-strong)}
  .pcard:active{transform:scale(.975)}
  .pcard .thumb{aspect-ratio:16/10;background:var(--accent-tint);display:grid;place-items:center;
     font-size:26px;font-weight:800;color:var(--accent)}
  .pcard .thumb img{width:100%;height:100%;object-fit:cover}
  .pcard .body{padding:10px 11px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
  .pcard .nm{font-weight:600;font-size:13.5px;line-height:1.3}
  .pcard .pr{font-weight:700;color:var(--text);margin-top:auto}

  /* cart rail (desktop) / sheet (mobile) */
  .cart{background:var(--raised);border-left:1px solid var(--line);display:flex;flex-direction:column}
  @media(max-width:879px){
    .cart{position:fixed;inset:auto 0 0 0;z-index:50;border-left:none;border-top:1px solid var(--line);
       border-radius:18px 18px 0 0;max-height:85dvh;transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
       box-shadow:0 -12px 40px rgba(0,0,0,.18)}
    body.cart-open .cart{transform:translateY(0)}
  }
  .cart-head{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
  .cart-head h2{font-size:15px;font-weight:700}
  .cart-head .x{font-size:22px;color:var(--muted);padding:4px;line-height:1;display:none}
  @media(max-width:879px){ .cart-head .x{display:block} }
  .cart-items{flex:1;overflow-y:auto;padding:8px 12px;min-height:60px}
  .citem{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid var(--surface)}
  .citem .ci-nm{flex:1;min-width:0}
  .citem .ci-nm .t{font-weight:600;font-size:13.5px;line-height:1.25}
  .citem .ci-nm .s{font-size:12px;color:var(--muted);margin-top:1px}
  .stepper{display:flex;align-items:center;gap:2px;background:var(--surface);border-radius:9px;padding:3px}
  .stepper button{width:30px;height:30px;border-radius:7px;background:var(--raised);font-weight:700;font-size:16px;
     display:grid;place-items:center;color:var(--text);border:1px solid var(--line)}
  .stepper .q{min-width:26px;text-align:center;font-weight:700;font-size:14px}
  .ci-line{font-weight:700;font-size:13.5px;min-width:64px;text-align:right}

  .cart-empty{padding:36px 20px;text-align:center;color:var(--muted)}
  .cart-empty .big{font-size:30px;margin-bottom:8px}
  .cart-empty .t{font-weight:600;color:var(--text);margin-bottom:3px;font-size:14px}
  .cart-empty .s{font-size:12.5px}

  .cart-foot{border-top:1px solid var(--line);padding:14px 18px 16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}
  .paymethods{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:13px}
  .pm{height:52px;border-radius:10px;border:1.5px solid var(--line-strong);background:var(--surface);
     display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10.5px;font-weight:600;color:var(--muted)}
  .pm .ic{font-size:17px}
  .pm.active{border-color:var(--accent);background:var(--accent-tint);color:var(--accent-press)}
  .totalrow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
  .totalrow .lbl{font-size:13px;color:var(--muted);font-weight:600}
  .totalrow .amt{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .cart-foot .row2{display:flex;gap:9px}
  .cart-foot .row2 .btn{flex:1}
  .cart-foot .clear{flex:0 0 auto;width:var(--tap);background:var(--surface);border:1.5px solid var(--line);
     border-radius:var(--r-sm);display:grid;place-items:center;font-size:18px;color:var(--muted)}

  /* mobile pay bar */
  .paybar{display:none}
  @media(max-width:879px){
    .paybar{display:flex;align-items:center;gap:12px;position:fixed;left:12px;right:12px;
       bottom:max(12px,calc(env(safe-area-inset-bottom) + 4px));z-index:40;background:var(--ink);color:#fff;
       border-radius:14px;padding:12px 14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    body.cart-open .paybar{display:none}
    .paybar.hidden{display:none}
    .paybar .ct{background:var(--accent);color:#fff;min-width:26px;height:26px;border-radius:7px;
       display:grid;place-items:center;font-weight:800;font-size:13px;padding:0 6px}
    .paybar .pt{flex:1}
    .paybar .pt .l{font-size:11px;color:#A79FC0;font-weight:500}
    .paybar .pt .v{font-size:17px;font-weight:800;letter-spacing:-.01em}
    .paybar .go{font-weight:700;font-size:14px;color:var(--accent)}
  }

  /* ---------- products list view ---------- */
  .page{padding:18px 16px 40px;max-width:760px;margin:0 auto;width:100%}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .page-head h1{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .plist{display:flex;flex-direction:column;gap:9px}
  .prow{display:flex;align-items:center;gap:13px;background:var(--raised);border:1px solid var(--line);
     border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow)}
  .prow .av{width:44px;height:44px;border-radius:10px;background:var(--accent-tint);display:grid;place-items:center;
     font-weight:800;color:var(--accent);flex:0 0 auto;overflow:hidden}
  .prow .av img{width:100%;height:100%;object-fit:cover}
  .prow .info{flex:1;min-width:0}
  .prow .info .t{font-weight:600;font-size:14.5px}
  .prow .info .s{font-size:12.5px;color:var(--muted);margin-top:2px}
  .prow .pr{font-weight:700;text-align:right}
  .prow .fc{font-size:11.5px;color:var(--muted);margin-top:2px}
  .fc.warn{color:var(--danger)}

  /* ---------- placeholder / empty ---------- */
  .empty-state{padding:60px 24px;text-align:center;max-width:420px;margin:40px auto}
  .empty-state .big{font-size:42px;margin-bottom:14px}
  .empty-state h2{font-size:19px;font-weight:700;margin-bottom:8px}
  .empty-state p{color:var(--muted);font-size:14px;line-height:1.55}

  /* ---------- toast + modal ---------- */
  .toast-wrap{position:fixed;left:0;right:0;bottom:0;z-index:200;display:flex;flex-direction:column;align-items:center;
     gap:8px;padding:0 16px max(16px,env(safe-area-inset-bottom));pointer-events:none}
  .toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:600;
     box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:440px;width:100%;display:flex;align-items:center;gap:10px;
     animation:rise .22s ease}
  .toast.ok{background:var(--success)}
  .toast.err{background:var(--danger)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .modal-bg{position:fixed;inset:0;z-index:150;background:rgba(20,15,10,.55);display:grid;place-items:center;padding:20px}
  .modal{background:var(--raised);border-radius:18px;max-width:380px;width:100%;overflow:hidden;animation:rise .2s ease}
  .modal .mh{background:var(--success-tint);padding:24px;text-align:center}
  .modal .mh .ck{width:54px;height:54px;border-radius:50%;background:var(--success);color:#fff;font-size:28px;
     display:grid;place-items:center;margin:0 auto 12px}
  .modal .mh h3{font-size:18px;font-weight:800}
  .modal .mh .inv{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:600}
  .modal .mb{padding:18px 22px 22px}
  .modal .ml{display:flex;justify-content:space-between;padding:7px 0;font-size:13.5px}
  .modal .ml.tot{border-top:1px solid var(--line);margin-top:6px;padding-top:12px;font-weight:800;font-size:16px}
  .modal .mb .btn{margin-top:16px}

  .spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;
     animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading-screen{min-height:100dvh;display:grid;place-items:center;color:var(--muted);gap:14px}
  .loading-screen .spin{border-color:var(--line-strong);border-top-color:var(--accent);width:30px;height:30px}

  /* ---------- product CRUD ---------- */
  .ph-actions{display:flex;gap:8px}
  .btn-sm{height:42px;padding:0 16px;border-radius:11px;background:var(--accent);color:#fff;font-weight:700;font-size:13.5px;white-space:nowrap}
  .btn-sm:hover{background:var(--accent-press)}
  .btn-sm.ghost{background:var(--raised);color:var(--text);border:1.5px solid var(--line-strong)}
  .prow-btn{width:100%;text-align:left;cursor:pointer;font:inherit}
  .prow-btn:hover{border-color:var(--line-strong)}
  .prow-btn:active{transform:scale(.99)}
  .prow.inactive{opacity:.5}
  .badge-off{font-size:10px;font-weight:700;color:var(--danger);background:var(--danger-tint);padding:1px 7px;border-radius:6px;vertical-align:middle}

  .fmodal{max-width:460px;max-height:92dvh;display:flex;flex-direction:column}
  .fmh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--line)}
  .fmh h3{font-size:17px;font-weight:800}
  .fx{font-size:25px;color:var(--muted);line-height:1;padding:2px 8px}
  .fmb{padding:16px 20px 22px;overflow-y:auto}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .fld input,.fld select{width:100%;height:46px;padding:0 13px;border:1.5px solid var(--line-strong);border-radius:10px;
     background:#fff;font-family:inherit;font-size:16px}
  .fld input:focus,.fld select:focus{border-color:var(--accent);outline:none}
  .frow{display:flex;gap:10px}
  .frow .fld{flex:1;min-width:0}
  .fhint{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.45}
  .ftoggle{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;padding:8px 0 4px;cursor:pointer}
  .ftoggle input{width:21px;height:21px;accent-color:var(--accent)}
  .fmb .btn{margin-top:12px}
  .btn-danger-ghost{background:var(--danger-tint);color:var(--danger);margin-top:8px}
  .catlist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
  .catrow{display:flex;align-items:center;justify-content:space-between;background:var(--surface);
     border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-weight:600;font-size:14px}
  .catdel{font-size:16px;color:var(--muted);padding:4px 6px}
  .catadd{display:flex;gap:8px}
  .catadd input{flex:1;height:46px;padding:0 13px;border:1.5px solid var(--line-strong);border-radius:10px;font-size:16px}
  .catadd .catbtn{width:auto;height:46px;padding:0 20px;margin:0}
  /* photo upload */
  .photo-row{display:flex;gap:13px;align-items:flex-start}
  .photo-prev{width:76px;height:76px;border-radius:12px;flex:0 0 auto;border:1.5px solid var(--line-strong);
     background:var(--accent-tint) center/cover no-repeat;display:grid;place-items:center;font-size:24px}
  .photo-prev span{opacity:.6}
  .photo-actions{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
  .btn-file{display:inline-flex;align-items:center;justify-content:center;height:42px;border-radius:10px;
     background:var(--ink);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;padding:0 16px;align-self:flex-start}
  .btn-file:hover{background:var(--ink-soft)}
  .photo-del{align-self:flex-start;font-size:12.5px;font-weight:600;color:var(--danger);padding:3px 0}
  .hidden{display:none}
  /* reports */
  .date-input{height:42px;padding:0 12px;border:1.5px solid var(--line-strong);border-radius:11px;
     background:var(--raised);font-family:inherit;font-size:14px;font-weight:600;color:var(--text)}
  .rep-today{font-size:13px;font-weight:600;color:var(--muted);background:var(--surface);
     border:1px solid var(--line);border-radius:999px;padding:8px 14px}
  .rep-loading{display:flex;align-items:center;justify-content:center;gap:12px;color:var(--muted);padding:50px 0}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:8px}
  .stat{background:var(--raised);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:var(--shadow)}
  .stat-big{grid-column:1/-1;background:var(--ink);border-color:var(--ink)}
  .stat-big .stat-l{color:#A79FC0}

/* ============================================================

let sb = null;
const state = {

      ${row('ft-rcp', a.recipes===true, srvRcp, 'Resep / BOM & Bahan', 'Atur resep, HPP otomatis dari bahan, kelola & beli bahan. Memunculkan menu Bahan.')}
      ${(!srvInv&&!srvExp&&!srvRcp)?`<div class="fhint">Paketmu belum menyertakan fitur lanjutan. Naikkan tier untuk membukanya.</div>`:''}

function saveFeatSettings(){
  let a={}; try{ a=JSON.parse(localStorage.getItem('convioAdv')||'{}'); }catch(e){}
  const inv=$('#ft-inv'), exp=$('#ft-exp'), rcp=$('#ft-rcp');
  if(inv) a.inventory=inv.checked;
  if(exp) a.expenses=exp.checked;

/* ---------- helpers ---------- */
const $  = s => document.querySelector(s);
const app = () => $('#app');
const BUILD = '22Jun-invite3';   // penanda versi — untuk memastikan file terbaru yang dijalankan
const rupiah = n => 'Rp' + Math.round(n||0).toLocaleString('id-ID');
const esc = s => String(s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initial = s => (s||'?').trim().charAt(0).toUpperCase();

function toast(msg, kind){
  const w = $('#toasts');
  const t = document.createElement('div');
  t.className = 'toast' + (kind ? ' '+kind : '');
  t.innerHTML = (kind==='ok'?'✓ ':kind==='err'?'✕ ':'') + esc(msg);
  w.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(8px)'; setTimeout(()=>t.remove(),200); }, 2600);
}

/* ---------- TOTALS: dihitung dari CART, tidak pernah dari DOM ---------- */
function cartTotal(){ return state.cart.reduce((s,i)=> s + i.price*i.qty, 0); }
function cartCount(){ return state.cart.reduce((s,i)=> s + i.qty, 0); }

/* ============================================================
   SUPABASE + AUTH
   ============================================================ */
function keyReady(){ return sb && !CONFIG.SUPABASE_ANON_KEY.startsWith('PASTE_'); }

function initSupabase(){
  if (CONFIG.SUPABASE_ANON_KEY.startsWith('PASTE_')) return false;
  try { sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY); return true; }
  catch(e){ console.error(e); return false; }
}

async function boot(){
  app().innerHTML = `<div class="loading-screen"><div class="spin"></div><div>Memuat…</div></div>`;
  if(!initSupabase()){ render(); return; }
  const { data } = await sb.auth.getSession();
  state.session = data.session || null;
  if(state.session){ await loadProfile(); }
  render();
  sb.auth.onAuthStateChange((_e, session)=>{
    state.session = session || null;
    if(!session){ state.profile=null; state.cart=[]; render(); }
  });
}

async function loadProfile(){
  const uid = state.session.user.id;
  const { data, error } = await sb.from('profiles')
    .select('id,role,cafeteria_id,tenant_id,outlet_id,full_name,is_active')
    .eq('id', uid).single();
  if(error){ state.profile = {error:error.message, noRow:(error.code==='PGRST116') || /0 rows|Results contain 0|no rows/i.test(error.message||'')}; return; }
  state.profile = data;
  state.ingLoaded = false; state.ingredients = [];   // reset cache bahan tiap profil dimuat
  if(['tenant_owner','cashier'].includes(data.role) && data.outlet_id){
    await Promise.all([
      sb.rpc('my_features').then(({data:f})=>{ state.features = f || {}; }).catch(()=>{ state.features = {}; }),
      loadCatalog(),
      sb.from('outlets').select('name').eq('id', data.outlet_id).maybeSingle().then(({data:o})=>{ state.outletName = (o&&o.name)||''; }).catch(()=>{}),
    ]);
  } else if(data.role==='super_admin'){
    await loadAdmin();
  } else if(data.role==='cafeteria_owner'){
    await loadOverview();
  }
}

async function loadCatalog(){
  const oid = state.profile.outlet_id;
  const wantRecipes = state.profile.role==='tenant_owner';
  const [c, p, ri] = await Promise.all([
    sb.from('categories').select('id,name,sort_order').eq('outlet_id', oid).order('sort_order',{ascending:true}),
    sb.from('products').select('id,category_id,name,price,cost,photo_url,sku,barcode,is_active,stock')
      .eq('outlet_id', oid).order('name',{ascending:true}),
    wantRecipes ? sb.from('recipe_items').select('product_id').eq('outlet_id', oid) : Promise.resolve({data:[]}),
  ]);
  state.categories = c.data || [];
  state.products = p.data || [];
  state.recipeIds = [...new Set((((ri&&ri.data))||[]).map(r=>r.product_id))];
}

async function signIn(){
  const email = $('#in-email').value.trim();
  const pw = $('#in-pw').value;
  if(!email || !pw){ toast('Isi email dan password.', 'err'); return; }
  setBtn('#btn-login', true, 'Masuk…');
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error){ setBtn('#btn-login', false, 'Masuk'); toast(authMsg(error.message), 'err'); return; }
  const { data } = await sb.auth.getSession();
  state.session = data.session;
  await loadProfile();
  render();
}
function authMsg(m){
  if(/invalid login/i.test(m)) return 'Email atau password salah.';
  return m;
}

async function signOut(){ await sb.auth.signOut(); }

/* ---------- cart ops ---------- */
function addToCart(id){
  const p = state.products.find(x=>x.id===id); if(!p) return;
  const ex = state.cart.find(x=>x.product_id===id);
  if(ex) ex.qty++; else state.cart.push({product_id:p.id, name:p.name, price:Number(p.price), qty:1});
  renderCart(); pulseBar();
}
function changeQty(id, d){
  const it = state.cart.find(x=>x.product_id===id); if(!it) return;
  it.qty += d;
  if(it.qty<=0) state.cart = state.cart.filter(x=>x.product_id!==id);
  renderCart();
}
function removeFromCart(id){ state.cart = state.cart.filter(x=>x.product_id!==id); renderCart(); }
function clearCart(){ if(!state.cart.length) return; state.cart=[]; renderCart(); document.body.classList.remove('cart-open'); }

/* ---------- checkout (via RPC, server authoritative) ---------- */
async function checkout(){
  if(!state.cart.length){ toast('Keranjang masih kosong.', 'err'); return; }
  if(state.busy) return;
  state.busy = true; setBtn('#btn-pay', true, 'Memproses…');
  const items = state.cart.map(i=>({ product_id:i.product_id, qty:i.qty, unit_price:i.price }));
  const snapshot = { items:[...state.cart], total:cartTotal(), pay:state.pay };
  const { data, error } = await sb.rpc('create_sale', {
    p_items: items, p_payment_method: state.pay, p_note: null
  });
  state.busy = false;
  if(error){
    setBtn('#btn-pay', false, 'Bayar ' + rupiah(cartTotal()));
    toast(error.message || 'Transaksi gagal.', 'err');   // pesan dari RAISE EXCEPTION (stok/tenant nonaktif/dll)
    return;
  }
  const sale = Array.isArray(data) ? data[0] : data;
  state.cart = []; document.body.classList.remove('cart-open');
  renderCart();
  showReceipt(sale, snapshot);
}

/* ============================================================
   RENDER
   ============================================================ */
function setBtn(sel, loading, txt){
  const b = $(sel); if(!b) return;
  b.disabled = !!loading;
  b.innerHTML = loading ? `<span class="spin"></span> ${esc(txt)}` : esc(txt);
}
function pulseBar(){ const b=$('.paybar'); if(b){ b.style.transform='scale(1.02)'; setTimeout(()=>b.style.transform='',120); } }

function render(){
  if(!keyReady()){ app().innerHTML = viewSetup(); return; }
  if(!state.session){ app().innerHTML = (state.authView==='signup' ? viewSignup() : viewLogin()); return; }
  if(!state.profile){ app().innerHTML = `<div class="loading-screen"><div class="spin"></div><div>Memuat profil…</div></div>`; return; }
  if(state.profile.error){ app().innerHTML = (state.profile.noRow ? viewRegister() : viewProfileError(state.profile.error)); return; }
  app().innerHTML = viewShell();
  if(['tenant_owner','cashier'].includes(state.profile.role)){ renderCart(); renderHeldBtn(); }
}

/* ---------- setup gate ---------- */
function viewSetup(){
  return `<div class="center"><div class="card">

    <div class="note"><b>Backend belum siap.</b><br>1. Tempel <b>anon key</b> Supabase ke <code>CONFIG.SUPABASE_ANON_KEY</code> di file ini (jangan pernah service_role).<br>2. Deploy <b>schema + RLS + RPC <code>create_sale</code></b> ke project Anda. Tanpa RLS, isolasi antar-tenant tidak ada.</div>
    <p class="hint">File ini hanya antarmuka. Keamanan multi-tenant hidup di RLS Supabase, bukan di sini. Setelah key terisi & SQL ter-deploy, halaman login muncul otomatis.</p>
  </div></div>`;
}
function viewProfileError(msg){
  return `<div class="center"><div class="card">
    <div class="login-logo"><img src="${LOGO_FULL}" alt="Convio"></div>
    <div class="note"><b>Profil tidak ditemukan.</b><br>${esc(msg)}<br><br>Pastikan ada baris di <code>public.profiles</code> untuk user ini (id = auth user id) dengan <code>role</code> & <code>outlet_id</code> terisi.</div>
    <button class="btn btn-ghost" data-action="logout">Keluar</button>

/* ---------- login ---------- */
function viewLogin(){
  return `<div class="center"><div class="card">
    <div class="login-logo"><img src="${LOGO_FULL}" alt="Convio"></div>
    <div class="field"><label>Email</label><input id="in-email" type="email" autocomplete="username" placeholder="nama@usaha.com"></div>
    <div class="field"><label>Password</label><input id="in-pw" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn btn-primary" id="btn-login" data-action="login">Masuk</button>
    <button class="btn btn-ghost" data-action="go-signup" style="margin-top:8px">Punya kode undangan? Daftar</button>
    ${state.authNote ? `<p class="hint" style="color:#0a7d33;text-align:center">${esc(state.authNote)}</p>` : ''}
    <p class="hint">Punya kode dari pemilik lokasi/usaha? Ketuk <b>Daftar</b>. Tanpa kode, akun dibuat oleh admin Anda.</p>
    <p class="hint" style="opacity:.5;font-size:11px;text-align:center;margin-top:6px">Build ${BUILD}</p>
  </div></div>`;
}

/* ---------- shell ---------- */
function roleLabel(r){ return {super_admin:'Super Admin', cafeteria_owner:'Pemilik Lokasi', tenant_owner:'Pemilik Usaha', cashier:'Kasir'}[r] || r; }

function viewShell(){
  const r = state.profile.role;
  const isPOS = ['tenant_owner','cashier'].includes(r);
  let content, tabs;
  if(isPOS){
    tabs = [{k:'pos', ic:'🛒', t:'Kasir'}];
    if(r==='tenant_owner') tabs.push({k:'products', ic:'☕', t:'Produk'});
    if(r==='cashier' || r==='tenant_owner') tabs.push({k:'report', ic:'📊', t: (r==='tenant_owner' && hasFeat('reports')) ? 'Laporan' : 'Transaksi'});
    if(r==='tenant_owner' && hasFeat('expenses')) tabs.push({k:'expenses', ic:'💸', t:'Biaya'});
    if(r==='tenant_owner' && (hasFeat('inventory') || hasFeat('recipes'))) tabs.push({k:'purchases', ic:'📦', t:'Beli'});
    if(r==='tenant_owner') tabs.push({k:'team', ic:'🧑‍🍳', t:'Tim'});
    if(!tabs.some(t=>t.k===state.tab)) state.tab='pos';
    content = state.tab==='products' ? viewProducts()
            : state.tab==='team'     ? viewCodes()
            : state.tab==='report'   ? viewReport()
            : state.tab==='expenses' ? viewExpenses()
            : state.tab==='purchases' ? viewPurchases()
            : viewPOS();
  } else if(r==='super_admin'){
    tabs = [{k:'admin', ic:'⚙', t:'Admin'}, {k:'opscodes', ic:'🎟️', t:'Undang'}];
    if(!['admin','opscodes'].includes(state.tab)) state.tab='admin';
    content = state.tab==='opscodes' ? viewOpsCodes() : viewAdmin();
  } else { // cafeteria_owner
    tabs = [{k:'agg', ic:'📊', t:'Ringkasan'}, {k:'invites', ic:'🎟️', t:'Undang'}];
    if(!['agg','invites'].includes(state.tab)) state.tab='agg';
    content = state.tab==='invites' ? viewCodes() : viewAgg();
  }

  return `<div class="shell">
    <aside class="side">
      ${brand()}
      <nav class="nav">
        ${tabs.map(t=>`<button data-action="tab" data-tab="${t.k}" class="${state.tab===t.k?'active':''}"><span class="ic">${t.ic}</span>${t.t}</button>`).join('')}
      </nav>
      <div class="who">
        <div class="nm">${esc(state.profile.full_name||state.session.user.email)}</div>
        <div class="rl">${roleLabel(r)}</div>
        <div class="rl" style="opacity:.5;font-size:11px;margin-top:2px">Build ${BUILD}</div>
        <button data-action="logout">Keluar</button>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        ${brand()}
        <button class="logout" data-action="logout">Keluar</button>
      </div>
      <div class="work">${content}</div>
      ${isPOS ? mobileTabs(tabs) : (tabs.length>1?mobileTabs(tabs):'')}
    </div>
  </div>`;
}
function mobileTabs(tabs){
  return `<nav class="tabbar">
    ${tabs.map(t=>`<button data-action="tab" data-tab="${t.k}" class="${state.tab===t.k?'active':''}"><span class="ic">${t.ic}</span>${t.t}</button>`).join('')}

function viewAgg(){

function aggBodyHTML(){
  if(!state.agg.loaded) return `<div class="rep-loading"><span class="spin"></span><span>Memuat…</span></div>`;
  const d = state.agg.data;
  if(!d) return `<div class="fhint" style="padding:8px 0">Gagal memuat ringkasan. Coba pilih bulan lagi.</div>`;
  const ten = (d.tenants||[]).slice();
  const omzet = Number(d.omzet)||0;
  const maxOmzet = Math.max(1, ...ten.map(t=>Number(t.omzet)||0));
  const cards = [
    {l:'Omzet bulan ini', v:rupiah(omzet),                       s:`${d.trx||0} transaksi`},
    {l:'Laba kotor',      v:rupiah(Number(d.laba_kotor)||0),     s:`HPP ${rupiah(Number(d.hpp)||0)}`},
    {l:'Omzet hari ini',  v:rupiah(Number(d.omzet_today)||0),    s:`${d.trx_today||0} transaksi`},
    {l:'Tenant aktif',    v:`${d.active_tenant_count||0}`,       s:`dari ${d.tenant_count||0} tenant`},
  ].map(c=>`<div class="ov-card"><div class="ov-l">${esc(c.l)}</div><div class="ov-v">${c.v}</div><div class="ov-s">${esc(c.s)}</div></div>`).join('');
  const rows = ten.length ? ten.map(t=>{
    const om=Number(t.omzet)||0;
    const pct = omzet>0 ? Math.round(om/omzet*100) : 0;
    const w = Math.round(om/maxOmzet*100);
    const laba = om - (Number(t.hpp)||0);
    const badge = (t.status && t.status!=='active') ? `<span class="ov-badge">${esc(t.status)}</span>` : '';
    return `<div class="ov-row">
      <div class="ov-row-top"><span class="ov-name">${esc(t.name)}${badge}</span><span class="tnum">${rupiah(om)}</span></div>
      <div class="ov-bar"><span style="width:${w}%"></span></div>
      <div class="ov-meta">${t.trx||0} trx · ${pct}% kontribusi · laba kotor ${rupiah(laba)}</div>
    </div>`;
  }).join('') : `<div class="fhint" style="padding:8px 0">Belum ada tenant di lokasi ini.</div>`;
  return `<div class="ov-cards">${cards}</div>
    <div class="ov-section"><div class="ov-h"><h2>Per tenant</h2><span class="ov-sub">urut omzet</span></div>${rows}</div>`;
}
async function loadOverview(){
  if(!state.agg.month) state.agg.month = curMonth();
  state.agg.loaded = false; renderOverview();
  const [y,m] = state.agg.month.split('-').map(Number);
  const start = state.agg.month+'-01';
  const end = (m===12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,'0')}`) + '-01';
  try{
    const { data, error } = await sb.rpc('cafeteria_overview', { p_start:start, p_end:end });

async function loadIngredients(force){
  if(!force && state.ingLoaded) return;   // pakai cache — hemat round-trip saat buka resep berulang
  const oid = state.profile.outlet_id;
  const { data, error } = await sb.from('ingredients')
    .select('id,name,unit,stock,cost,is_active').eq('outlet_id', oid).order('name');
  if(error){ toast(error.message,'err'); return; }
  state.ingredients = data || [];
  state.ingLoaded = true;
}
async function manageIngredients(){ await loadIngredients(true); openIngredientsModal(); }
function openIngredientsModal(){
  closeModal();

function openIngredientModal(ing){
  const isEdit=!!ing;
  const el=document.createElement('div'); el.className='modal-bg'; el.id='modal';
  el.innerHTML=`<div class="modal fmodal">
    <div class="fmh"><h3>${isEdit?'Ubah Bahan':'Bahan Baru'}</h3><button class="fx" data-action="close-modal" aria-label="Tutup">×</button></div>
    <div class="fmb">
      <input type="hidden" id="ing-id" value="${isEdit?ing.id:''}">
      <div class="fld"><label>Nama bahan *</label><input id="ing-name" type="text" value="${isEdit?esc(ing.name):''}" placeholder="mis. Kopi bubuk"></div>
      <div class="fld"><label>Satuan *</label><input id="ing-unit" type="text" value="${isEdit?esc(ing.unit):'gram'}" placeholder="gram / ml / pcs"></div>
      <div class="frow">
        <div class="fld"><label>Stok</label><input id="ing-stock" type="number" inputmode="decimal" min="0" step="any" value="${isEdit?(+ing.stock||0):0}"></div>
        <div class="fld"><label>Biaya per satuan *</label><input id="ing-cost" type="number" inputmode="decimal" min="0" step="any" value="${isEdit?(+ing.cost||0):0}"></div>
      </div>
      <div class="fhint">Biaya per satuan menentukan HPP produk yang memakai bahan ini. (Tahap berikutnya: terisi otomatis dari pembelian.)</div>
      <button class="btn btn-primary" id="btn-save-ing" data-action="save-ingredient">${isEdit?'Simpan':'Tambah'}</button>
    </div></div>`;
  document.body.appendChild(el);
  setTimeout(()=>{ const n=$('#ing-name'); if(n) n.focus(); },60);
}
async function saveIngredient(){
  const id=$('#ing-id').value||null;
  const name=$('#ing-name').value.trim();
  const unit=$('#ing-unit').value.trim()||'pcs';
  const stock=Number($('#ing-stock').value||0);
  const cost=Number($('#ing-cost').value||0);
  if(!name){ toast('Nama bahan wajib.','err'); return; }
  if(!(stock>=0)){ toast('Stok tidak valid.','err'); return; }
  if(!(cost>=0)){ toast('Biaya tidak valid.','err'); return; }
  setBtn('#btn-save-ing', true, 'Menyimpan…');
  try {
    const { error } = await withTimeout(sb.rpc('upsert_ingredient', { p_id:id, p_name:name, p_unit:unit, p_stock:stock, p_cost:cost }));
    if(error) throw error;
    if(id){ await withTimeout(Promise.all([ loadIngredients(true), loadCatalog() ])); }  // edit: biaya bisa berubah → HPP produk ikut
    else  { await withTimeout(loadIngredients(true)); }                                    // baru: belum dipakai resep → tak perlu refetch produk
    render();   // cat ulang daftar produk dgn HPP terbaru (bukan cuma reload state)
    openIngredientsModal();
    toast('Bahan disimpan','ok');
  } catch(e){
    setBtn('#btn-save-ing', false, id?'Simpan':'Tambah');
    toast((e&&e.message)||'Gagal menyimpan bahan.', 'err');
  }
}
async function delIngredient(id){
  if(!confirm('Hapus bahan ini? Tidak bisa jika masih dipakai di resep.')) return;
  const { error } = await sb.from('ingredients').delete().eq('id', id);
  if(error){ toast('Tak bisa dihapus — kemungkinan masih dipakai di resep. Hapus dari resep dulu.','err'); return; }
  await loadIngredients(true); openIngredientsModal(); toast('Bahan dihapus','ok');
}

/* ---- resep per produk ---- */
async function openRecipe(productId){
  const [, recRes] = await Promise.all([
    loadIngredients(),
    sb.from('recipe_items').select('ingredient_id,qty').eq('product_id', productId),
  ]);
  if(!state.ingredients.length){ toast('Tambahkan bahan dulu (tombol Bahan) sebelum menyusun resep.','err'); return; }
  if(recRes.error){ toast(recRes.error.message,'err'); return; }
  state.recipeProductId = productId;
  state.rcart = (recRes.data||[]).map(r=>({ ingredient_id:r.ingredient_id, qty:Number(r.qty) }));
  openRecipeModal(productId);
}

function renderRcart(){ const b=$('#rcart-list'); if(b) b.innerHTML=rcartHTML(); }
function rcartAdd(){
  const ing=$('#rc-ing').value;
  const qty=Number($('#rc-qty').value);
  if(!ing){ toast('Pilih bahan.','err'); return; }
  if(!(qty>0)){ toast('Qty harus lebih dari 0.','err'); return; }

  renderRcart();
}

async function saveRecipe(){
  const pid=state.recipeProductId;
  const items=state.rcart.map(r=>({ ingredient_id:r.ingredient_id, qty:r.qty }));
  // HPP dihitung lokal dari resep → modal langsung tertutup, tak menunggu jaringan
  const localCost = Math.round(state.rcart.reduce((a,r)=>a + r.qty*ingCost(r.ingredient_id), 0)*100)/100;
  const prod = state.products.find(p=>p.id===pid);
  if(prod) prod.cost = localCost;
  if(items.length){ if(!state.recipeIds.includes(pid)) state.recipeIds.push(pid); }
  else { state.recipeIds = state.recipeIds.filter(x=>x!==pid); }   // resep dikosongkan → bukan produk resep lagi
  state.rcart=[];
  closeModal();
  render();
  toast(`Resep disimpan — ${items.length} bahan, HPP ${rupiah(localCost)}.`, 'ok');
  // simpan ke server di latar belakang; beri tahu hanya bila gagal (resep idempotent → aman disimpan ulang)
  try {
    const { error } = await withTimeout(sb.rpc('save_recipe', { p_product_id:pid, p_items:items }));
    if(error) throw error;
  } catch(e){
    toast('Gagal menyimpan resep ke server: ' + ((e&&e.message)||'koneksi') + '. Buka resep lalu simpan ulang.', 'err');
  }
}

function closeModal(){ document.querySelectorAll('#modal').forEach(m=>m.remove()); }
// Jamin sebuah promise jaringan tak menggantung selamanya (mis. respons hilang di wifi lemah).
function withTimeout(promise, ms){
  return Promise.race([
    Promise.resolve(promise),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('Koneksi lambat atau terputus. Periksa koneksi lalu coba lagi.')), ms||18000)),
  ]);
}

const MAX_PHOTO_BYTES = 2*1024*1024;   // 2MB, sejalan dgn batas bucket
let pendingPhoto = null;               // {blob,dataUrl} foto baru utk diunggah saat simpan
let removePhoto  = false;              // user minta hapus foto yang ada

function uid(){
  return (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : 'p' + Date.now() + '-' + Math.random().toString(36).slice(2,10);
}

// Kecilkan + kompres gambar di sisi klien → JPEG, sisi terpanjang maks `maxDim`.
function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if(w >= h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h > w && h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      c.toBlob(blob=>{
        if(!blob){ reject(new Error('toBlob gagal')); return; }
        const r = new FileReader();
        r.onload = ()=> resolve({ blob, dataUrl: r.result });
        r.onerror = ()=> reject(new Error('baca blob gagal'));
        r.readAsDataURL(blob);
      }, 'image/jpeg', quality);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('muat gambar gagal')); };
    img.src = url;
  });
}

async function handlePhotoSelect(input){
  const file = input.files && input.files[0];
  if(!file) return;
  if(!/^image\//.test(file.type)){ toast('File harus berupa gambar.', 'err'); input.value=''; return; }
  try {
    const { blob, dataUrl } = await compressImage(file, 800, 0.82);
    if(blob.size > MAX_PHOTO_BYTES){ toast('Gambar masih >2MB setelah dikompres. Pakai gambar lain.', 'err'); return; }
    pendingPhoto = { blob, dataUrl };
    removePhoto = false;
    const pv = $('#f-preview');
    if(pv){ pv.style.backgroundImage = `url('${dataUrl}')`; pv.classList.add('has'); pv.innerHTML=''; }
    const fd = $('#f-photo-del'); if(fd) fd.classList.remove('hidden');
  } catch(e){ toast('Gagal memproses gambar.', 'err'); }
}

async function saveProduct(){
  const id    = $('#f-id').value;
  const name  = $('#f-name').value.trim();
  const priceRaw = $('#f-price').value;
  const price = Number(priceRaw);
  const cost  = Number($('#f-cost').value || 0);
  if(!name){ toast('Nama produk wajib diisi.', 'err'); return; }
  if(priceRaw==='' || isNaN(price) || price<0){ toast('Harga jual tidak valid.', 'err'); return; }
  if(isNaN(cost) || cost<0){ toast('Harga modal tidak valid.', 'err'); return; }

  const payload = {
    name,
    category_id: $('#f-cat').value || null,
    price, cost,
    sku:       $('#f-sku').value.trim() || null,
    barcode:   $('#f-barcode').value.trim() || null,
    is_active: $('#f-active').checked,
  };

  // --- foto: unggah yang baru, atau hapus, atau biarkan apa adanya ---
  if(pendingPhoto){
    setBtn('#btn-save-prod', true, 'Mengunggah foto…');
    const path = `${state.profile.outlet_id}/${uid()}.jpg`;
    const { error: upErr } = await sb.storage.from('product-photos')
      .upload(path, pendingPhoto.blob, { contentType:'image/jpeg', upsert:false });
    if(upErr){
      setBtn('#btn-save-prod', false, id?'Simpan perubahan':'Tambah produk');
      toast('Upload foto gagal: ' + upErr.message, 'err'); return;
    }
    const { data: pub } = sb.storage.from('product-photos').getPublicUrl(path);
    payload.photo_url = pub.publicUrl;
  } else if(removePhoto){
    payload.photo_url = null;
  }
  // (jika tidak ada perubahan foto: photo_url tidak disertakan → nilai lama dipertahankan saat update)

  setBtn('#btn-save-prod', true, 'Menyimpan…');
  const COLS = 'id,category_id,name,price,cost,photo_url,sku,barcode,is_active,stock';
  try {
    let error, rows;
    if(id){
      if(state.recipeIds.includes(id)) delete payload.cost;  // produk resep: HPP dari resep, jangan ditimpa
      ({ data: rows, error } = await withTimeout(sb.from('products').update(payload).eq('id', id).select(COLS)));
    } else {
      // stempel kunci isolasi dari profil — WAJIB agar lolos RLS WITH CHECK
      payload.cafeteria_id = state.profile.cafeteria_id;
      payload.tenant_id    = state.profile.tenant_id;
      payload.outlet_id    = state.profile.outlet_id;
      ({ data: rows, error } = await withTimeout(sb.from('products').insert(payload).select(COLS)));
    }
    if(error) throw error;
    // update state lokal langsung — tanpa refetch (muncul instan)
    const row = rows && rows[0];
    if(row){
      const i = state.products.findIndex(p=>p.id===row.id);
      if(i>=0) state.products[i] = row; else state.products.push(row);
      state.products.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    } else {
      await withTimeout(loadCatalog());   // fallback: kalau baris tak dikembalikan, refetch agar produk PASTI muncul
    }
    closeModal();
    render();
    toast(id?'Produk diperbarui':'Produk ditambahkan', 'ok');
  } catch(e){
    setBtn('#btn-save-prod', false, id?'Simpan perubahan':'Tambah produk');
    toast((e&&e.message)||'Gagal menyimpan produk.', 'err');
  }
}

async function deleteProduct(id){
  if(!confirm('Hapus produk ini PERMANEN? Tidak bisa dibatalkan.\n\nKalau produk sudah pernah terjual, gunakan "Nonaktif" saja.')) return;
  const { error } = await sb.from('products').delete().eq('id', id);
  if(error){
    if(/foreign key|violates|constraint/i.test(error.message)){
      toast('Produk ini sudah punya transaksi — tidak bisa dihapus. Nonaktifkan saja agar tidak muncul di kasir.', 'err');
    } else { toast(error.message, 'err'); }
    return;
  }
  closeModal();
  state.products = state.products.filter(p=>p.id!==id);
  state.recipeIds = state.recipeIds.filter(x=>x!==id);
  render();
  toast('Produk dihapus', 'ok');
}

/* ============ CETAK STRUK — ESC/POS 58mm (RawBT / Bluetooth / Dialog) ============ */
function getRcpt(){
  let r={}; try{ r=JSON.parse(localStorage.getItem('convioRcpt')||'{}'); }catch(e){}
  return { width:+r.width||32, header:r.header||'', addr:r.addr||'', footer:(r.footer!=null?r.footer:'Terima kasih!') };
}
function setRcpt(o){ try{ localStorage.setItem('convioRcpt', JSON.stringify(o)); }catch(e){} }
function rcptNum(n){ return Math.round(+n||0).toLocaleString('id-ID'); }
function padLR(l,r,w){ const s=w-l.length-r.length; return l+' '.repeat(Math.max(1,s))+r; }

function buildReceiptData(sale, snap){
  const cfg=getRcpt(); const pay=PAYS.find(p=>p.k===snap.pay);
  const dt=sale&&sale.created_at?new Date(sale.created_at):new Date();
  const p2=n=>String(n).padStart(2,'0');
  const dd=`${p2(dt.getDate())}/${p2(dt.getMonth()+1)}/${dt.getFullYear()} ${p2(dt.getHours())}:${p2(dt.getMinutes())}`;
  return { width:cfg.width, header:(cfg.header||state.outletName||'STRUK').toUpperCase(), addr:cfg.addr, footer:cfg.footer,
    inv:(sale&&(sale.invoice_no||sale.invoiceNo))||'-', datetime:dd, cashier:(state.profile&&state.profile.full_name)||'',
    items:snap.items.map(i=>({name:i.name, qty:i.qty, price:i.price})), total:(sale&&sale.total!=null?sale.total:snap.total), pay:pay?pay.label:snap.pay };
}
function escposBytes(d){
  const W=d.width||32, b=[], ESC=0x1B, GS=0x1D, LF=0x0A;
  const t=s=>{ for(let i=0;i<s.length;i++) b.push(s.charCodeAt(i)&0xFF); };
  b.push(ESC,0x40);                         // init
  b.push(ESC,0x61,1); b.push(GS,0x21,0x11); b.push(ESC,0x45,1);  // center + double + bold
  t(d.header); b.push(LF);
  b.push(ESC,0x45,0); b.push(GS,0x21,0x00);
  if(d.addr) d.addr.split('\n').forEach(l=>{ t(l); b.push(LF); });
  b.push(ESC,0x61,0); b.push(LF);           // left
  t('No : '+d.inv); b.push(LF); t(d.datetime); b.push(LF);
  if(d.cashier){ t('Kasir : '+d.cashier); b.push(LF); }
  t('-'.repeat(W)); b.push(LF);
  d.items.forEach(it=>{ t(it.name); b.push(LF); t(padLR('  '+it.qty+' x '+rcptNum(it.price), rcptNum(it.price*it.qty), W)); b.push(LF); });
  t('-'.repeat(W)); b.push(LF);
  b.push(ESC,0x45,1); t(padLR('TOTAL','Rp '+rcptNum(d.total),W)); b.push(LF); b.push(ESC,0x45,0);
  t('Bayar : '+d.pay); b.push(LF); t('-'.repeat(W)); b.push(LF);
  b.push(ESC,0x61,1);
  if(d.footer) d.footer.split('\n').forEach(l=>{ t(l); b.push(LF); });
  b.push(LF,LF,LF); b.push(GS,0x56,0x00);   // potong (diabaikan bila tanpa cutter)
  return new Uint8Array(b);
}
function bytesToB64(by){ let s=''; for(let i=0;i<by.length;i++) s+=String.fromCharCode(by[i]); return btoa(s); }
function printRawBT(d){ window.location.href='rawbt:base64,'+bytesToB64(escposBytes(d)); }
async function printBLE(d){
  if(!navigator.bluetooth){ toast('Bluetooth langsung tak tersedia (perlu HTTPS + Chrome)','err'); return; }
  try{
    setBtn('#rcpt-ble',true,'Menghubungkan…');
    const dev=await navigator.bluetooth.requestDevice({ acceptAllDevices:true,
      optionalServices:[0x18F0,0xFF00,0xFFE0,0xFFB0,0x180A,
        '0000ffe0-0000-1000-8000-00805f9b34fb','000018f0-0000-1000-8000-00805f9b34fb',
        '49535343-fe7d-4ae5-8fa9-9fafd205e455','e7810a71-73ae-499d-8c15-faa9aef0c3f2'] });
    const srv=await dev.gatt.connect(); const services=await srv.getPrimaryServices(); let ch=null;
    for(const s of services){ const cs=await s.getCharacteristics();
      for(const c of cs){ if(c.properties.write||c.properties.writeWithoutResponse){ ch=c; break; } } if(ch) break; }
    if(!ch) throw new Error('Karakteristik tulis tak ditemukan');
    const by=escposBytes(d), CH=180, wwr=ch.properties.writeWithoutResponse;
    for(let i=0;i<by.length;i+=CH){ const part=by.slice(i,i+CH); if(wwr) await ch.writeValueWithoutResponse(part); else await ch.writeValue(part); }
    toast('Terkirim ke printer','ok');
  }catch(e){ toast('Gagal: '+(e.message||e),'err'); }
  finally{ setBtn('#rcpt-ble',false,'Bluetooth'); }
}
function printDialog(d){
  const W=d.width||32, mm=(W>32?'80mm':'58mm');
  const rows=d.items.map(it=>`<tr><td colspan="2">${esc(it.name)}</td></tr><tr><td>&nbsp;&nbsp;${it.qty} x ${rcptNum(it.price)}</td><td class="r">${rcptNum(it.price*it.qty)}</td></tr>`).join('');
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(d.inv)}</title>
<style>@page{size:${mm} auto;margin:0}*{font-family:'Courier New',monospace}
body{margin:0;padding:4px;width:${mm};font-size:12px;color:#000}
.c{text-align:center}.r{text-align:right}.h{font-size:15px;font-weight:700}
table{width:100%;border-collapse:collapse}td{font-size:12px;padding:0}
.d{border-top:1px dashed #000;margin:4px 0}.tot td{font-weight:700;font-size:13px}</style></head>
<body><div class="c h">${esc(d.header)}</div>${d.addr?`<div class="c">${esc(d.addr).replace(/\n/g,'<br>')}</div>`:''}
<div class="d"></div><div>No : ${esc(d.inv)}</div><div>${esc(d.datetime)}</div>${d.cashier?`<div>Kasir : ${esc(d.cashier)}</div>`:''}
<div class="d"></div><table>${rows}</table><div class="d"></div>
<table><tr class="tot"><td>TOTAL</td><td class="r">Rp ${rcptNum(d.total)}</td></tr></table><div>Bayar : ${esc(d.pay)}</div>
<div class="d"></div>${d.footer?`<div class="c">${esc(d.footer).replace(/\n/g,'<br>')}</div>`:''}
<scr`+`ipt>window.onload=function(){setTimeout(function(){window.print();},250);}<\/scr`+`ipt></body></html>`;
  const ifr=document.createElement('iframe'); ifr.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(ifr); const doc=ifr.contentWindow.document; doc.open(); doc.write(html); doc.close();
  setTimeout(()=>{ try{ifr.remove();}catch(e){} }, 8000);
}
function doPrint(method){
  const lr=state.lastReceipt; if(!lr){ toast('Tak ada struk untuk dicetak','err'); return; }
  const d=buildReceiptData(lr.sale, lr.snap);
  if(method==='rawbt') printRawBT(d); else if(method==='ble') printBLE(d); else printDialog(d);
}

/* ============================================================
   REPORTS — laporan harian + riwayat transaksi
   ============================================================ */
function todayJkt(){ return new Date().toLocaleDateString('en-CA', { timeZone:'Asia/Jakarta' }); } // YYYY-MM-DD

async function loadReport(){
  const isOwner = state.profile.role==='tenant_owner';
  const date = isOwner ? (state.report.date || todayJkt()) : todayJkt(); // kasir terkunci hari ini
  state.report.date = date;
  state.report.loaded = false;
  renderReport();
  // rentang hari dalam zona Asia/Jakarta (UTC+7) → ISO UTC untuk query
  const startMs = new Date(`${date}T00:00:00+07:00`).getTime();
  const startIso = new Date(startMs).toISOString();
  const endIso   = new Date(startMs + 86400000).toISOString();

  const { data: sales, error } = await sb.from('sales')
    .select('id,invoice_no,total,subtotal,payment_method,status,created_at')
    .gte('created_at', startIso).lt('created_at', endIso)
    .order('created_at', { ascending:false });
  if(error){ toast(error.message, 'err'); state.report.loaded=true; renderReport(); return; }

  let items = [];
  const paidIds = (sales||[]).filter(s=>s.status==='paid').map(s=>s.id);
  if(paidIds.length){
    const { data: si } = await sb.from('sale_items')
      .select('sale_id,qty,unit_price,unit_cost,line_total,product_id').in('sale_id', paidIds);
    items = si || [];
  }
  state.report.sales = sales || [];
  state.report.items = items;
  state.report.loaded = true;
  renderReport();
}

function reportSummary(){
  const paid = state.report.sales.filter(s=>s.status==='paid');
  const omzet = paid.reduce((a,s)=> a + Number(s.total), 0);
  const trx = paid.length;
  const aov = trx ? omzet/trx : 0;
  const cogs = state.report.items.reduce((a,i)=> a + Number(i.unit_cost)*Number(i.qty), 0);
  const laba = omzet - cogs;
  const pay = {}; PAYS.forEach(p=> pay[p.k]=0);
  paid.forEach(s=>{ pay[s.payment_method] = (pay[s.payment_method]||0) + Number(s.total); });
  return { omzet, trx, aov, cogs, laba, pay };
}
function topProducts(n){
  const map = {};
  state.report.items.forEach(i=>{
    const nm = (state.products.find(p=>p.id===i.product_id)||{}).name || 'Produk';
    if(!map[i.product_id]) map[i.product_id] = { name:nm, qty:0 };
    map[i.product_id].qty += Number(i.qty);
  });
  return Object.values(map).sort((a,b)=> b.qty - a.qty).slice(0, n);
}

function viewReport(){
  const isOwner = state.profile.role==='tenant_owner';
  if(!state.report.date) state.report.date = todayJkt();
  const picker = isOwner
    ? `<input type="date" id="rep-date" class="date-input" value="${state.report.date}" max="${todayJkt()}">`
    : `<span class="rep-today">Hari ini</span>`;
  return `<div class="page">
    <div class="page-head"><h1>${(isOwner && hasFeat('reports'))?'Laporan':'Transaksi'}</h1>${picker}</div>
    <div id="report-body">${reportBodyHTML()}</div>
  </div>`;
}
function renderReport(){ const b=$('#report-body'); if(b) b.innerHTML = reportBodyHTML(); }

function reportBodyHTML(){
  if(!state.report.loaded) return `<div class="rep-loading"><span class="spin"></span><span>Memuat…</span></div>`;
  const isOwner = state.profile.role==='tenant_owner';
  const s = reportSummary();
  // Analitik lengkap (P&L: laba/HPP, rincian bayar, terlaris) = fitur 'reports'.
  // Pemilik tanpa 'reports' (mis. Free): hanya kartu OMZET + daftar transaksi + void.
  const showAnalytics = state.profile.role!=='tenant_owner' || hasFeat('reports');

  const stats = showAnalytics
    ? [
        { l:'Omzet', v:rupiah(s.omzet), big:true },
        { l:'Transaksi', v:s.trx },
        { l:'Rata-rata / transaksi', v:rupiah(s.aov) },
        ...(isOwner ? [{ l:'Laba kotor', v:rupiah(s.laba), sub:`HPP ${rupiah(s.cogs)}` }] : []),
      ]
    : [ { l:'Omzet', v:rupiah(s.omzet), big:true } ];   // Free: total omzet saja, tanpa HPP & margin
  const statCards = stats.map(st=>`<div class="stat ${st.big?'stat-big':''}">
    <div class="stat-l">${st.l}</div><div class="stat-v tnum">${st.v}</div>
    ${st.sub?`<div class="stat-s tnum">${st.sub}</div>`:''}</div>`).join('');

  const payRows = PAYS.filter(p=>s.pay[p.k]>0)
    .map(p=>`<div class="payrow"><span>${p.ic} ${p.label}</span><span class="tnum">${rupiah(s.pay[p.k])}</span></div>`).join('')
    || `<div class="fhint" style="padding:4px 0">Belum ada pembayaran.</div>`;

  const tops = topProducts(5);
  const topRows = tops.map((t,i)=>`<div class="toprow"><span class="topn">${i+1}</span>
    <span class="topnm">${esc(t.name)}</span><span class="topq tnum">${t.qty}×</span></div>`).join('');

  const trx = state.report.sales.map(sl=>{
    const time = new Date(sl.created_at).toLocaleTimeString('id-ID', { timeZone:'Asia/Jakarta', hour:'2-digit', minute:'2-digit' });
    const pay = PAYS.find(p=>p.k===sl.payment_method);
    const off = sl.status!=='paid';
    return `<button class="trxrow ${off?'voided':''}" data-action="sale-detail" data-id="${sl.id}">
      <div class="trx-l"><div class="trx-inv">${esc(sl.invoice_no)}${off?` <span class="badge-off">${esc(sl.status)}</span>`:''}</div>
        <div class="trx-meta">${time} · ${pay?pay.label:sl.payment_method}</div></div>
      <div class="trx-tot tnum">${rupiah(sl.total)}</div>
    </button>`;
  }).join('');

  return `
    <div class="stats">${statCards}</div>
    ${showAnalytics?`<div class="rep-sec"><h3>Rincian pembayaran</h3><div class="repbox">${payRows}</div></div>`:''}
    ${showAnalytics && topRows?`<div class="rep-sec"><h3>Produk terlaris</h3><div class="repbox">${topRows}</div></div>`:''}
    <div class="rep-sec"><h3>Transaksi (${state.report.sales.length})</h3>
      ${trx ? `<div class="trxlist">${trx}</div>` : `<div class="rep-empty">Belum ada transaksi pada tanggal ini.</div>`}
    </div>`;
}

async function openSaleDetail(id){
  const sale = state.report.sales.find(s=>s.id===id); if(!sale) return;
  const { data: items, error } = await sb.from('sale_items')
    .select('qty,unit_price,line_total,product_id').eq('sale_id', id);
  if(error){ toast(error.message, 'err'); return; }
  const lines = (items||[]).map(i=>{
    const nm = (state.products.find(p=>p.id===i.product_id)||{}).name || 'Produk';
    return `<div class="ml"><span>${esc(nm)} × ${i.qty} <span class="muted-sm">@${rupiah(i.unit_price)}</span></span>
      <span class="tnum">${rupiah(i.line_total)}</span></div>`;
  }).join('');
  const when = new Date(sale.created_at).toLocaleString('id-ID', { timeZone:'Asia/Jakarta', dateStyle:'medium', timeStyle:'short' });
  const pay = PAYS.find(p=>p.k===sale.payment_method);
  const role = state.profile.role;
  let actions = '';
  if(sale.status==='paid'){
    if(role==='cashier'){
      actions = `<button class="btn btn-danger" data-action="void-sale" data-id="${id}">Batalkan transaksi</button>`;
    } else if(role==='tenant_owner'){
      actions = `<div class="frow">
        <button class="btn btn-danger" data-action="void-sale" data-id="${id}">Batalkan (Void)</button>
        <button class="btn btn-ghost" data-action="refund-sale" data-id="${id}">Refund</button>
      </div>`;
    }
  } else {
    actions = `<div class="fhint" style="margin-top:10px">Transaksi ini berstatus <b>${esc(sale.status)}</b> dan tidak dihitung dalam omzet/laba.</div>`;
  }
  const el = document.createElement('div'); el.className='modal-bg'; el.id='modal';
  el.innerHTML = `<div class="modal fmodal">
    <div class="fmh"><h3>${esc(sale.invoice_no)}</h3><button class="fx" data-action="close-modal" aria-label="Tutup">×</button></div>
    <div class="fmb">
      <div class="fhint" style="margin-bottom:12px">${when} · ${pay?pay.label:sale.payment_method} · ${esc(sale.status)}</div>
      ${lines}
      <div class="ml tot"><span>Total</span><span class="tnum">${rupiah(sale.total)}</span></div>
      ${actions}
    </div>
  </div>`;
  document.body.appendChild(el);
}

function subLabel(s){ return ({active:'Aktif', suspended:'Suspend', expired:'Kedaluwarsa'})[s] || s; }
function fmtDate(d){ if(!d) return '—'; return new Date(d+'T00:00:00+07:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function plusDaysJkt(n){ return new Date(Date.now()+n*86400000).toLocaleDateString('en-CA',{timeZone:'Asia/Jakarta'}); }

async function loadAdmin(){
  const [caf, sub, ten, out, prof, pln] = await Promise.all([
    sb.from('cafeterias').select('id,name,address,phone,status,created_at').order('created_at',{ascending:true}),
    sb.from('subscriptions').select('id,cafeteria_id,status,price,current_period_end,plan_id'),
    sb.from('tenants').select('id,cafeteria_id,name,status,plan_id'),
    sb.from('outlets').select('id,cafeteria_id,tenant_id,name'),
    sb.from('profiles').select('id,role,cafeteria_id,tenant_id,outlet_id,full_name,is_active'),
    sb.from('plans').select('id,name,price,duration_days,description,is_active,features').order('price',{ascending:true}),
  ]);
  state.admin.cafeterias = caf.data || [];
  state.admin.subs = {}; (sub.data||[]).forEach(s=> state.admin.subs[s.cafeteria_id]=s);
  state.admin.tenants  = ten.data || [];
  state.admin.outlets  = out.data || [];
  state.admin.profiles = prof.data || [];
  state.admin.plans    = pln.data || [];
  state.admin.loaded = true;
}

  if(!state.admin.loaded) return `<div class="page"><div class="rep-loading"><span class="spin"></span><span>Memuat…</span></div></div>`;

function planById(id){ return (state.admin.plans||[]).find(p=>p.id===id); }
function planForCaf(cafId){ const s=state.admin.subs[cafId]; return s?planById(s.plan_id):null; }
function tenantCount(cafId){ return state.admin.tenants.filter(t=>t.cafeteria_id===cafId).length; }
function userCount(cafId){ return state.admin.profiles.filter(p=>p.cafeteria_id===cafId).length; }
function featSummary(plan){
  if(!plan) return '';
  const f = plan.features||{};
  const on = FEAT_BOOLS.filter(x=>f[x.k]===true).map(x=>x.label);
  const lim = [];
  if(+f.max_tenants>0) lim.push(`maks ${+f.max_tenants} tenant`);
  if(+f.max_users>0)   lim.push(`maks ${+f.max_users} akun`);
  return [...on, ...lim].join(' · ') || 'Kasir & Produk saja';
}
function planOptions(selectedId){
  const act = (state.admin.plans||[]).filter(p=>p.is_active);
  const blank = `<option value="">— tanpa paket / manual —</option>`;

}
function applyPlanPick(sel, priceSel, endSel){
  const p = planById(sel.value); if(!p) return;
  const pr=$(priceSel); if(pr) pr.value = Math.round(p.price);

async function savePlan(){

  if(!(duration_days>=1)){ toast('Durasi minimal 1 hari.','err'); return; }
  const features={};
  document.querySelectorAll('[data-feat]').forEach(c=>{ features[c.dataset.feat]=c.checked; });
  document.querySelectorAll('[data-limit]').forEach(i=>{ const v=parseInt(i.value,10); features[i.dataset.limit]=(Number.isFinite(v)&&v>0)?v:0; });
  setBtn('#btn-save-plan', true, 'Menyimpan…');

  if(id){ ({error}=await sb.from('plans').update({name,price,duration_days,description,is_active,features}).eq('id',id)); }

function heldKey(){ return 'held_'+((state.profile && state.profile.outlet_id) || 'none'); }
function getHeld(){ try{ return JSON.parse(localStorage.getItem(heldKey())||'[]'); }catch(_){ return []; } }
function setHeldArr(arr){ try{ localStorage.setItem(heldKey(), JSON.stringify(arr)); }catch(_){ toast('Gagal menyimpan (penyimpanan penuh?).','err'); } }
function renderHeldBtn(){
  const b=$('#held-btn'); if(!b) return;
  const n=getHeld().length;
  b.style.display = n ? 'inline-flex' : 'none';
  const c=b.querySelector('.hb-n'); if(c) c.textContent=n;
}
function holdOrder(){
  if(!state.cart.length){ toast('Keranjang kosong.','err'); return; }
  const label = (prompt('Label pesanan (mis. Meja 3 / a.n. Budi):')||'').trim()
    || ('Pesanan '+new Date().toLocaleTimeString('id-ID',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit'}));
  const arr=getHeld();
  arr.unshift({ id:uid(), label, cart:state.cart.map(i=>({...i})), pay:state.pay, ts:Date.now() });
  setHeldArr(arr);
  state.cart=[]; renderCart(); renderHeldBtn();
  document.body.classList.remove('cart-open');
  toast('Pesanan ditahan','ok');
}
function heldListHTML(){
  const arr=getHeld();
  if(!arr.length) return `<div class="fhint">Tidak ada pesanan tertahan.</div>`;
  return arr.map(o=>{
    const n=o.cart.reduce((a,i)=>a+i.qty,0);
    const tot=o.cart.reduce((a,i)=>a+i.price*i.qty,0);
    const t=new Date(o.ts).toLocaleTimeString('id-ID',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit'});
    return `<div class="held-row">
      <button class="held-main" data-action="recall-held" data-id="${o.id}">
        <div class="held-nm">${esc(o.label)}</div>
        <div class="held-meta">${n} item · ${rupiah(tot)} · ${t}</div>
      </button>
      <button class="held-del" data-action="del-held" data-id="${o.id}" aria-label="Hapus">🗑</button>
    </div>`;
  }).join('');
}
function openHeldModal(){
  const el=document.createElement('div'); el.className='modal-bg'; el.id='modal';
  el.innerHTML=`<div class="modal fmodal">
    <div class="fmh"><h3>Pesanan tertahan</h3><button class="fx" data-action="close-modal" aria-label="Tutup">×</button></div>

function recallHeld(id){
  const arr=getHeld(); const o=arr.find(x=>x.id===id); if(!o) return;
  if(state.cart.length && !confirm('Keranjang saat ini akan diganti. Lanjutkan?')) return;
  state.cart=o.cart.map(i=>({...i}));
  state.pay=o.pay||'cash';
  setHeldArr(arr.filter(x=>x.id!==id));
  closeModal(); renderCart(); renderHeldBtn();
  document.body.classList.add('cart-open');

function delHeld(id){
  setHeldArr(getHeld().filter(x=>x.id!==id));

  renderHeldBtn();
}

/* ---- biaya (pengeluaran) ---- */
const EXP_CATS = [
  {k:'gaji', label:'Gaji'}, {k:'sewa', label:'Sewa'}, {k:'listrik', label:'Listrik'},
  {k:'air', label:'Air'}, {k:'marketing', label:'Marketing'}, {k:'lainnya', label:'Lainnya'},
];
function expCatLabel(k){ return (EXP_CATS.find(c=>c.k===k)||{}).label || k; }
function curMonth(){ return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Jakarta'}).slice(0,7); }
async function loadExpenses(){
  const month = state.expenses.month || curMonth();
  state.expenses.month = month;
  state.expenses.loaded = false; renderExpenses();
  const [y,m] = month.split('-').map(Number);
  const start = month+'-01';
  const end   = (m===12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,'0')}`) + '-01';
  const { data, error } = await sb.from('expenses')
    .select('id,category,amount,expense_date,note')
    .gte('expense_date', start).lt('expense_date', end)
    .order('expense_date', { ascending:false });
  if(error){ toast(error.message,'err'); state.expenses.loaded=true; renderExpenses(); return; }
  state.expenses.list = data || [];
  try { const { data:pl } = await sb.rpc('monthly_pl', { p_start:start, p_end:end }); state.expenses.pl = pl || null; }
  catch(_){ state.expenses.pl = null; }
  state.expenses.loaded = true; renderExpenses();

async function loadSuppliers(){
  const { data } = await sb.from('suppliers').select('id,name,phone,note,is_active').order('name');

async function loadPurchases(){
  const month = state.purchases.month || curMonth();
  state.purchases.month = month;
  state.purchases.loaded = false; renderPurchases();
  await loadSuppliers();
  const [y,m] = month.split('-').map(Number);
  const start = month+'-01';
  const end   = (m===12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,'0')}`) + '-01';
  const { data, error } = await sb.from('purchases')
    .select('id,invoice_no,purchase_date,total,supplier_id,note')
    .gte('purchase_date', start).lt('purchase_date', end)
    .order('purchase_date', { ascending:false });
  if(error){ toast(error.message,'err'); state.purchases.loaded=true; renderPurchases(); return; }
  state.purchases.list = data || [];
  state.purchases.loaded = true; renderPurchases();
}

function renderPcart(){ const b=$('#pcart-list'); if(b) b.innerHTML = pcartHTML(); }
function pcartAdd(){
  const val=$('#pu-item').value;
  const qty=Number($('#pu-qty').value);
  const uc=Number($('#pu-uc').value);
  if(!val){ toast('Pilih produk atau bahan.','err'); return; }
  if(!(qty>0)){ toast('Qty harus lebih dari 0.','err'); return; }
  if(!(uc>=0)){ toast('Harga beli tidak valid.','err'); return; }
  const kind = val.charAt(0)==='i' ? 'ingredient' : 'product';
  const rid = val.slice(2);
  let name, unit='';
  if(kind==='product'){ const p=state.products.find(x=>x.id===rid); if(!p){ toast('Produk tak ditemukan.','err'); return; } name=p.name; }
  else { const ing=state.ingredients.find(x=>x.id===rid); if(!ing){ toast('Bahan tak ditemukan.','err'); return; } name=ing.name; unit=ing.unit; }
  state.pcart.push({ kind, id:rid, name, unit, qty, unit_cost:uc });
  const q=$('#pu-qty'), u=$('#pu-uc'); if(q) q.value=''; if(u) u.value='';
  renderPcart();
}
function pcartDel(idx){ state.pcart.splice(Number(idx),1); renderPcart(); }
async function savePurchase(){
  if(!state.pcart.length){ toast('Tambahkan minimal 1 item.','err'); return; }
  const supplier_id=$('#pu-sup').value||null;
  const purchase_date=$('#pu-date').value||todayJkt();
  const invoice_no=$('#pu-inv').value.trim()||null;
  const note=$('#pu-note').value.trim()||null;
  const items=state.pcart.map(i=> i.kind==='ingredient'
    ? ({ ingredient_id:i.id, qty:i.qty, unit_cost:i.unit_cost })
    : ({ product_id:i.id, qty:i.qty, unit_cost:i.unit_cost }));
  setBtn('#btn-save-pur', true, 'Menyimpan…');
  try {
    const { data, error } = await withTimeout(sb.rpc('create_purchase', {
      p_items: items, p_supplier_id: supplier_id, p_purchase_date: purchase_date, p_invoice_no: invoice_no, p_note: note
    }));
    if(error) throw error;
    state.pcart=[];
    closeModal();
    await withTimeout(Promise.all([ loadCatalog(), loadIngredients(true), loadPurchases() ]));  // stok/HPP produk & bahan + daftar
    render();   // cat ulang layar (daftar beli + HPP produk saat ke tab Produk)
    const d=(data&&data[0])||{};
    toast(`Pembelian disimpan — ${rupiah(d.total||0)}. Stok & HPP diperbarui.`, 'ok');
  } catch(e){
    setBtn('#btn-save-pur', false, 'Simpan pembelian');
    toast((e&&e.message)||'Gagal menyimpan pembelian.', 'err');
  }
}

/* ============================================================
   PENDAFTARAN MANDIRI VIA KODE  (frontend untuk SQL register_with_code)
   Alur: Daftar akun (Auth) -> [profil belum ada] -> tukar kode -> profil dibuat server.
   Satu kode bisa 'tenant' (buat usaha baru) atau 'staff' (gabung jadi kasir);
   server yang menentukan, klien hanya konfirmasi.
   ============================================================ */
function goSignup(){ state.authView='signup'; state.authNote=null; render(); }
function goLogin(){ state.authView='login'; render(); }

function viewSignup(){
  return `<div class="center"><div class="card">
    <div class="login-logo"><img src="${LOGO_FULL}" alt="Convio"></div>
    <p class="hint" style="text-align:center;margin-bottom:8px">Langkah 1 dari 2 · Buat akun</p>
    <div class="field"><label>Email</label><input id="su-email" type="email" autocomplete="username" placeholder="nama@usaha.com"></div>
    <div class="field"><label>Password</label><input id="su-pw" type="password" autocomplete="new-password" placeholder="minimal 6 karakter"></div>
    <button class="btn btn-primary" id="btn-signup" data-action="signup-create">Buat akun</button>
    <button class="btn btn-ghost" data-action="go-login" style="margin-top:8px">Sudah punya akun? Masuk</button>
    <p class="hint">Setelah akun dibuat, Anda akan memasukkan kode undangan dari pemilik lokasi/usaha.</p>
  </div></div>`;
}

async function signUpCreate(){
  const email=(($('#su-email')||{}).value||'').trim();
  const pw=(($('#su-pw')||{}).value||'');
  if(!email || !pw){ toast('Isi email dan password.','err'); return; }
  if(pw.length<6){ toast('Password minimal 6 karakter.','err'); return; }
  setBtn('#btn-signup', true, 'Membuat…');
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if(error){
    setBtn('#btn-signup', false, 'Buat akun');
    if(/already registered|already exists|already been registered/i.test(error.message||'')){
      state.authNote='Email itu sudah terdaftar. Silakan Masuk lalu lanjutkan dengan kode.'; goLogin(); return;
    }
    toast(authMsg(error.message),'err'); return;
  }
  if(data && data.session){            // konfirmasi email OFF -> lanjut langsung
    state.session=data.session; state.authView='login'; await loadProfile(); render();
  } else {                             // konfirmasi email ON -> verifikasi dulu
    state.authNote='Akun dibuat. Buka email Anda untuk konfirmasi, lalu Masuk untuk memasukkan kode.';
    goLogin();
  }
}

    return `<div class="center"><div class="card">

async function regCheck(){
  const code=(($('#rg-code')||{}).value||'').trim().toUpperCase();
  if(!code){ toast('Masukkan kode.','err'); return; }
  setBtn('#btn-rgcheck', true, 'Mengecek…');
  const { data, error } = await sb.rpc('peek_code', { p_code: code });
  setBtn('#btn-rgcheck', false, 'Cek kode');
  if(error){ toast(error.message,'err'); return; }
  if(!data || !data.ok){ toast('Kode tidak valid, nonaktif, kedaluwarsa, atau sudah habis.','err'); return; }
  state.reg.code = code; state.reg.info = data; render();
}
function regReset(){ state.reg.info=null; state.reg.code=null; render(); }

async function regSubmit(){
  const info=state.reg.info; if(!info) return;
  const full=(($('#rg-name')||{}).value||'').trim()||null;
  const tname=(info.kind==='tenant' && $('#rg-tenant')) ? (($('#rg-tenant')||{}).value||'').trim() : null;
  if(info.kind==='tenant' && !tname){ toast('Isi nama usaha.','err'); return; }
  setBtn('#btn-rgsubmit', true, 'Mendaftar…');
  const { error } = await sb.rpc('register_with_code', { p_code: state.reg.code, p_full_name: full, p_tenant_name: tname });
  if(error){ setBtn('#btn-rgsubmit', false, 'Selesaikan pendaftaran'); toast(error.message,'err'); return; }
  state.reg.info=null; state.reg.code=null;
  await loadProfile(); render();
  toast('Pendaftaran berhasil. Selamat datang!','ok');
}

/* ============================================================
   PANEL KODE UNDANGAN (sisi pemilik)
   tenant_owner -> kode 'staff' (undang kasir, terikat outlet)
   cafeteria_owner -> kode 'tenant' (undang usaha baru ke lokasinya)
   ============================================================ */
function genCode(){
  const a='ABCDEFGHJKMNPQRSTUVWXYZ23456789';  // tanpa 0/O/1/I/L agar mudah dibaca
  let s=''; for(let i=0;i<8;i++){ s+=a[Math.floor(Math.random()*a.length)]; if(i===3) s+='-'; }
  return s;
}
async function loadCodes(force){
  if(state.codes.loaded && !force) return;
  const kind = (state.profile.role==='tenant_owner') ? 'staff' : 'tenant';
  state.codes.kind = kind;
  const { data } = await sb.from('invite_codes')
    .select('id,code,label,max_uses,used_count,expires_at,is_active,outlet_id,kind')
    .order('created_at',{ascending:false});
  state.codes.list = (data||[]).filter(c=>c.kind===kind);   // RLS sudah membatasi; saring ganda utk aman
  if(kind==='staff'){
    const { data:o } = await sb.from('outlets').select('id,name').eq('tenant_id', state.profile.tenant_id);
    state.codes.outlets = o||[];
  }
  state.codes.loaded = true;
  render();
}
function viewCodes(){
  const kind = state.codes.kind || (state.profile.role==='tenant_owner'?'staff':'tenant');
  const staff = kind==='staff';
  const title = staff ? 'Tim · Kode Kasir' : 'Undang Usaha · Kode Pendaftaran';
  const sub = staff
    ? 'Bagikan kode ke calon kasir. Mereka mendaftar sendiri (Daftar di layar masuk) lalu otomatis menjadi Kasir di outlet yang Anda pilih.'
    : 'Bagikan kode ke calon pemilik usaha. Mereka mendaftar sendiri dan membuat usaha baru di lokasi Anda.';
  if(!state.codes.loaded){
    return `<div style="padding:16px"><h2 style="margin:0 0 4px">${title}</h2><p style="color:#667">Memuat…</p></div>`;
  }
  const rows = (state.codes.list||[]).map(c=>{
    const used=c.used_count||0; const cap=(c.max_uses==null)?'∞':c.max_uses;
    const exp=c.expires_at ? new Date(c.expires_at).toLocaleDateString('id-ID') : 'tanpa batas';
    const habis=(c.max_uses!=null) && used>=c.max_uses;
    const status=!c.is_active ? 'nonaktif' : (habis?'habis':'aktif');
    const oName=staff && c.outlet_id ? (((state.codes.outlets||[]).find(o=>o.id===c.outlet_id)||{}).name||'') : '';
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px;border:1px solid #e6e6ea;border-radius:10px;margin-bottom:8px;flex-wrap:wrap">
      <div style="min-width:160px">
        <div style="font-weight:700;font-size:18px;letter-spacing:1px">${esc(c.code)}</div>
        <div style="color:#667;font-size:12px;margin-top:2px">${esc(c.label||'(tanpa label)')}${oName?(' · '+esc(oName)):''} · ${used}/${cap} dipakai · exp ${exp} · <b>${status}</b></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-sm" data-action="copy-code" data-code="${esc(c.code)}">Salin</button>
        <button class="btn-sm" data-action="toggle-code" data-id="${c.id}" data-on="${c.is_active?1:0}">${c.is_active?'Nonaktifkan':'Aktifkan'}</button>
        <button class="btn-sm" data-action="del-code" data-id="${c.id}" style="border-color:#e2b4b4;color:#b3261e">Hapus</button>
      </div>
    </div>`;
  }).join('') || `<p style="color:#667">Belum ada kode. Buat satu untuk mulai mengundang.</p>`;
  return `<div style="padding:16px;max-width:760px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      <div><h2 style="margin:0 0 4px">${title}</h2><p style="color:#667;margin:0;max-width:520px">${sub}</p></div>
      <button class="btn btn-primary" data-action="new-code" style="white-space:nowrap">+ Buat kode</button>
    </div>
    ${rows}
  </div>`;
}
function openCodeModal(){
  const staff = state.codes.kind==='staff';
  let outletField='';
  if(staff){
    const opts=(state.codes.outlets||[]).map(o=>`<option value="${o.id}" ${o.id===state.profile.outlet_id?'selected':''}>${esc(o.name)}</option>`).join('');
    outletField = `<div class="fld"><label>Outlet tujuan kasir *</label><select id="cc-outlet">${opts||`<option value="${state.profile.outlet_id||''}">Outlet Anda</option>`}</select></div>`;

    <div class="fmb">
