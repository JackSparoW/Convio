        <div class="fld"><label>Batas pemakaian</label><input id="cc-max" type="number" min="1" step="1" placeholder="kosong = tak terbatas"></div>
        <div class="fld"><label>Kedaluwarsa (hari)</label><input id="cc-days" type="number" min="1" step="1" placeholder="kosong = tak ada"></div>
      </div>
      <div class="fhint">Kode acak dibuat otomatis. Sekali pakai lebih aman — isi batas pemakaian = 1 untuk satu orang.</div>
      <button class="btn btn-primary" id="btn-save-code" data-action="save-code">Buat kode</button>
    </div></div>`;

async function saveCode(){
  const staff = state.codes.kind==='staff';
  const label=(($('#cc-label')||{}).value||'').trim()||null;
  const maxRaw=(($('#cc-max')||{}).value||''); const max_uses=maxRaw?Math.max(1,parseInt(maxRaw,10)):null;
  const days=(($('#cc-days')||{}).value||''); let expires_at=null;
  if(days){ const d=new Date(); d.setDate(d.getDate()+Math.max(1,parseInt(days,10))); expires_at=d.toISOString(); }
  const row={ code:genCode(), label, max_uses, expires_at, is_active:true,
              kind: state.codes.kind, cafeteria_id: state.profile.cafeteria_id, created_by: state.profile.id };
  if(staff){
    row.tenant_id = state.profile.tenant_id;
    const oid = $('#cc-outlet') ? $('#cc-outlet').value : state.profile.outlet_id;
    if(!oid){ toast('Pilih outlet tujuan.','err'); return; }
    row.outlet_id = oid;
  }
  setBtn('#btn-save-code', true, 'Membuat…');
  let { error } = await sb.from('invite_codes').insert(row);
  if(error && /duplicate|unique/i.test(error.message||'')){ row.code=genCode(); ({ error } = await sb.from('invite_codes').insert(row)); }
  if(error){ setBtn('#btn-save-code', false, 'Buat kode'); toast(error.message,'err'); return; }
  closeModal(); await loadCodes(true); toast('Kode dibuat: '+row.code, 'ok');
}
async function toggleCode(id, isOn){
  const { error } = await sb.from('invite_codes').update({ is_active: !isOn }).eq('id', id);
  if(error){ toast(error.message,'err'); return; }
  if(state.tab==='opscodes'){ await loadOpsCodes(); } else { await loadCodes(true); }
}
async function delCode(id){
  if(!confirm('Hapus kode ini? Kode yang sudah dibagikan tidak bisa dipakai lagi.')) return;
  const { error } = await sb.from('invite_codes').delete().eq('id', id);
  if(error){ toast(error.message,'err'); return; }
  if(state.tab==='opscodes'){ await loadOpsCodes(); } else { await loadCodes(true); }
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast('Kode disalin: '+txt,'ok')).catch(()=>toast('Salin manual: '+txt,'err'));
  } else { toast('Salin manual: '+txt,'err'); }
}

/* ============================================================

function viewOpsCodes(){
  if(!state.ops.loaded){ return `<div class="page"><div class="rep-loading"><span class="spin"></span><span>Memuat…</span></div></div>`; }
  const cafName = id => (state.admin.cafeterias.find(c=>c.id===id)||{}).name || '—';
  const tenName = id => (state.admin.tenants.find(t=>t.id===id)||{}).name || '—';
  const outName = id => (state.admin.outlets.find(o=>o.id===id)||{}).name || '';
  const rows = state.ops.list.map(c=>{
    const used=c.used_count||0; const cap=(c.max_uses==null)?'∞':c.max_uses;
    const exp=c.expires_at? new Date(c.expires_at).toLocaleDateString('id-ID') : 'tanpa batas';
    const habis=(c.max_uses!=null)&&used>=c.max_uses;
    const status=!c.is_active?'nonaktif':(habis?'habis':'aktif');
    const isStaff=c.kind==='staff';
    const scope=isStaff
      ? `Kasir → ${esc(tenName(c.tenant_id))}${c.outlet_id?(' · '+esc(outName(c.outlet_id))):''}`
      : `Usaha → ${esc(cafName(c.cafeteria_id))}`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px;border:1px solid #e6e6ea;border-radius:10px;margin-bottom:8px;flex-wrap:wrap">
      <div style="min-width:190px">
        <div style="font-weight:700;font-size:18px;letter-spacing:1px">${esc(c.code)} <span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:${isStaff?'#e8f0ff':'#eafff0'};color:${isStaff?'#1a56db':'#067647'};vertical-align:middle">${esc(c.kind)}</span></div>
        <div style="color:#667;font-size:12px;margin-top:3px">${scope} · ${used}/${cap} dipakai · exp ${exp} · <b>${status}</b>${c.label?(' · '+esc(c.label)):''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-sm" data-action="copy-code" data-code="${esc(c.code)}">Salin</button>
        <button class="btn-sm" data-action="toggle-code" data-id="${c.id}" data-on="${c.is_active?1:0}">${c.is_active?'Nonaktifkan':'Aktifkan'}</button>
        <button class="btn-sm" data-action="del-code" data-id="${c.id}" style="border-color:#e2b4b4;color:#b3261e">Hapus</button>
      </div>
    </div>`;
  }).join('') || `<p style="color:#667">Belum ada kode. Buat kode usaha atau kasir untuk lokasi/usaha mana pun.</p>`;
  return `<div class="page">
    <div class="page-head"><h1>Undang · Operator</h1>
      <div class="ph-actions">
        <button class="btn-sm" data-action="ops-new-tenant">+ Kode Usaha</button>
        <button class="btn-sm" data-action="ops-new-staff">+ Kode Kasir</button>
      </div></div>
    <p style="color:#667;margin:0 0 14px;max-width:660px">Cetak kode untuk lokasi atau usaha mana pun tanpa berpindah akun. <b>Kode Usaha</b> → pendaftar menjadi Pemilik Usaha baru di lokasi terpilih. <b>Kode Kasir</b> → pendaftar bergabung sebagai Kasir ke usaha/outlet terpilih.</p>
    ${rows}
  </div>`;
}
function openOpsCodeModal(kind){
  const staff = kind==='staff';
  let picker='';
  if(staff){
    const opts=(state.admin.outlets||[]).map(o=>{
      const t=(state.admin.tenants||[]).find(x=>x.id===o.tenant_id);
      const c=(state.admin.cafeterias||[]).find(x=>x.id===o.cafeteria_id);
      if(!t) return '';   // outlet tanpa tenant (mis. milik pemilik lokasi) dilewati
      return `<option value="${o.tenant_id}|${o.id}">${esc(t.name)} · ${esc(o.name)} (${esc(c?c.name:'?')})</option>`;
    }).filter(Boolean).join('');
    picker=`<div class="fld"><label>Usaha · Outlet tujuan kasir *</label><select id="oc-to">${opts||'<option value="">(belum ada usaha/outlet)</option>'}</select></div>`;
  } else {
    const opts=(state.admin.cafeterias||[]).filter(c=>c.status==='active').map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
    picker=`<div class="fld"><label>Lokasi tujuan usaha *</label><select id="oc-caf">${opts||'<option value="">(belum ada lokasi aktif)</option>'}</select></div>`;
  }
  const el=document.createElement('div'); el.id='modal'; el.className='modal-bg';
  el.innerHTML=`<div class="modal fmodal">
    <div class="fmh"><h3>${staff?'Kode Kasir (operator)':'Kode Usaha (operator)'}</h3><button class="fx" data-action="close-modal" aria-label="Tutup">×</button></div>
    <div class="fmb">
      ${picker}
      <div class="fld"><label>Label (opsional)</label><input id="oc-label" type="text" placeholder="${staff?'mis. Kasir cabang X':'mis. Mitra calon Y'}"></div>
      <div class="frow">
        <div class="fld"><label>Batas pemakaian</label><input id="oc-max" type="number" min="1" step="1" placeholder="kosong = tak terbatas"></div>
        <div class="fld"><label>Kedaluwarsa (hari)</label><input id="oc-days" type="number" min="1" step="1" placeholder="kosong = tak ada"></div>
      </div>
      <div class="fhint">Kode acak otomatis. Untuk satu orang, set batas pemakaian = 1.</div>
      <button class="btn btn-primary" id="btn-ops-save" data-action="${staff?'ops-save-staff':'ops-save-tenant'}">Buat kode</button>
    </div></div>`;
  document.body.appendChild(el);
}
async function saveOpsCode(kind){
  const label=(($('#oc-label')||{}).value||'').trim()||null;
  const maxRaw=(($('#oc-max')||{}).value||''); const max_uses=maxRaw?Math.max(1,parseInt(maxRaw,10)):null;
  const days=(($('#oc-days')||{}).value||''); let expires_at=null;
  if(days){ const d=new Date(); d.setDate(d.getDate()+Math.max(1,parseInt(days,10))); expires_at=d.toISOString(); }
  const row={ code:genCode(), label, max_uses, expires_at, is_active:true, kind, created_by: state.profile.id };
  if(kind==='tenant'){
    const cid=(($('#oc-caf')||{}).value||''); if(!cid){ toast('Pilih lokasi tujuan.','err'); return; }
    row.cafeteria_id=cid;
  } else {
    const v=(($('#oc-to')||{}).value||''); if(!v){ toast('Pilih usaha/outlet tujuan.','err'); return; }
    const [tid,oid]=v.split('|');
    const ten=(state.admin.tenants||[]).find(t=>t.id===tid);
    if(!ten){ toast('Usaha tak ditemukan.','err'); return; }
    row.tenant_id=tid; row.outlet_id=oid; row.cafeteria_id=ten.cafeteria_id;
  }
  setBtn('#btn-ops-save', true, 'Membuat…');
  let { error } = await sb.from('invite_codes').insert(row);
  if(error && /duplicate|unique/i.test(error.message||'')){ row.code=genCode(); ({ error } = await sb.from('invite_codes').insert(row)); }
  if(error){ setBtn('#btn-ops-save', false, 'Buat kode'); toast(error.message,'err'); return; }
  closeModal(); await loadOpsCodes(); toast('Kode dibuat: '+row.code, 'ok');
}

boot();
</script>
</body>
</html>
